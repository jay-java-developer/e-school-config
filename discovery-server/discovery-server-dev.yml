server:
  port: 87611  # Port where the Eureka Server will run

eureka:
  instance:
    hostname: localhost  # Hostname of the Eureka Server

  client:
    fetchRegistry: false        # Eureka Server does NOT fetch registry (acts as registry itself)
    registerWithEureka: false   # Prevents Eureka Server from registering itself

    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
      # Base URL used by clients to connect to Eureka Server

spring:
  cloud:
    bus:
      enabled: true  # Enable Spring Cloud Bus for distributed config refresh
      destination: springCloudBus  # Topic/exchange name used for bus communication

    stream:
      bindings:
        springCloudBusInput:
          destination: springCloudBus  # Must match the bus destination
          group: config-server-group  # Consumer group for handling messages

  rabbitmq:
    host: localhost       # RabbitMQ server host
    port: 5672            # Default RabbitMQ port
    username: admin       # RabbitMQ username
    password: admin123    # RabbitMQ password

    listener:
      simple:
        missing-queues-fatal: false
        # Prevent application crash if queues are not yet created

# ===============================
# Actuator Configuration
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: "*"
        # Expose all actuator endpoints (e.g., /actuator/bus-refresh)