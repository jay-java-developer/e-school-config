server:
  port: 8081  # Port where the API Gateway will run

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true  # Enable automatic route mapping using Eureka service names
              lower-case-service-id: true  # Convert service IDs to lowercase in routes (e.g., /user-service)

    bus:
      enabled: true  # Enable Spring Cloud Bus for distributed configuration updates
      destination: springCloudBus  # Messaging topic/exchange used for bus events

    stream:
      bindings:
        springCloudBusInput:
          destination: springCloudBus  # Must match the bus destination
          group: config-server-group  # Consumer group (important for message processing)

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/e-school-micro-service
          # URL of the authorization server issuing JWT tokens (e.g., Keycloak)

  rabbitmq:
    host: localhost       # RabbitMQ server host
    port: 5672            # Default RabbitMQ port
    username: admin       # RabbitMQ username (as configured in Docker/container)
    password: admin123    # RabbitMQ password
    listener:
      simple:
        missing-queues-fatal: false
        # Prevent application failure if queues are not yet created

eureka:
  instance:
    hostname: localhost  # Hostname used for Eureka registration

  client:
    fetchRegistry: true        # Fetch registry of services from Eureka
    registerWithEureka: true   # Register this API Gateway with Eureka
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:8761/eureka/
      # Eureka Server URL

# ===============================
# Actuator Configuration
# ===============================
management:
  health:
    circuitbreakers:
      enabled: true  # Include circuit breaker status in health endpoint

  endpoints:
    web:
      exposure:
        include: "*"  # Expose all actuator endpoints (use carefully in production)

  endpoint:
    health:
      show-details: always  # Always show detailed health information

# ===============================
# Resilience4j Configuration
# ===============================
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        # Register circuit breaker health with actuator

        slidingWindowType: COUNT_BASED
        # Use a fixed number of calls to measure failure rate

        slidingWindowSize: 10
        # Number of calls recorded in the window

        failureRateThreshold: 50
        # Percentage of failures to open the circuit

        waitDurationInOpenState: 5s
        # Time circuit stays open before moving to half-open

        permittedNumberOfCallsInHalfOpenState: 3
        # Allowed test calls when half-open

        automaticTransitionFromOpenToHalfOpenEnabled: true
        # Automatically transition from OPEN to HALF-OPEN

        minimum-number-of-calls: 5
        # Minimum calls before calculating failure rate

  timelimiter:
    configs:
      default:
        timeout-duration: 3s
        # Maximum time allowed for a request before timeout

  retry:
    configs:
      default:
        max-attempts: 3
        # Number of retry attempts before failing

        wait-duration: 2s
        # Delay between retries

